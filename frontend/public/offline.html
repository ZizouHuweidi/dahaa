<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dahaa Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Inter, system-ui, sans-serif; background: #fff7ed; color: #111827; padding: 24px; }
      main { max-width: 420px; border-radius: 28px; background: white; padding: 28px; box-shadow: 0 24px 80px rgba(120, 53, 15, 0.16); }
      h1 { margin: 0 0 12px; font-size: 32px; }
      p { margin: 0; line-height: 1.6; color: #475569; }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Dahaa needs a live connection for multiplayer rounds. Reconnect and the game will resume when possible.</p>
    </main>
  </body>
